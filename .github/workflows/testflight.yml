name: TestFlight Upload

# Builds the core app with MANUAL App Store signing and uploads to TestFlight.
#
# Why manual signing: xcodebuild's automatic provisioning (-allowProvisioningUpdates)
# is broken under Xcode 16 (it 401s on appstoreconnect.apple.com/xcbuild/listTeams.action
# even with valid credentials). Manual signing never touches that path. The signing
# cert + App Store profile were generated up front via the App Store Connect API and
# committed / stored as a secret. Upload is done with the same API key.
#
# The key id / issuer id / team id below are NOT secret (identifiers, useless without
# the private key) so they are hardcoded to remove paste errors. The only auth secrets:
#   ASC_KEY_P8_BASE64    the App Store Connect .p8 key (raw PEM or base64 — both accepted)
#   ASC_DIST_P12_BASE64  base64 of the distribution .p12 (private key + cert)
#
# The provisioning profile lives in the repo at ci/ReFx_AppStore.mobileprovision.

on:
  # Auto-upload a TestFlight build on every push to main (i.e. whenever an app
  # update lands). Build number defaults to the unique run number, so successive
  # builds never collide. Manual dispatch and testflight-* tags still work too.
  workflow_dispatch:
    inputs:
      build_number:
        description: "Build number (must be unique; defaults to the run number)"
        required: false
        default: ""
  push:
    branches:
      - main
    tags:
      - "testflight-*"

jobs:
  upload:
    # macos-26 ships Xcode 26 (iOS 26 SDK), which Apple now requires for uploads.
    runs-on: macos-26
    timeout-minutes: 45
    env:
      SCHEME: "ReFxApp (Release)"
      BUNDLE_ID: com.refx.app
      PROFILE_NAME: "ReFx App Store"
      # Passphrase for the distribution .p12 — now a repo secret (was hardcoded).
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      # Non-secret identifiers (safe to hardcode; the .p8 private key is the secret).
      ASC_KEY_ID: "8V5T35NFKV"
      ASC_ISSUER_ID: "82d15814-03ed-4912-b694-6addfbe1827e"
      APPLE_TEAM_ID: "FM8Z8BA64H"
    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets are present
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
          ASC_DIST_P12_BASE64: ${{ secrets.ASC_DIST_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          missing=0
          for v in ASC_KEY_P8_BASE64 ASC_DIST_P12_BASE64 P12_PASSWORD; do
            if [ -z "${!v}" ]; then echo "::error::Missing secret $v"; missing=1; fi
          done
          [ "$missing" = "0" ] || exit 1

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project (lean spec)
        run: xcodegen generate --spec project-testflight.yml

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/keys"
          KEY="$RUNNER_TEMP/keys/AuthKey.p8"
          if printf '%s' "$ASC_KEY_P8_BASE64" | grep -q 'BEGIN PRIVATE KEY'; then
            printf '%s\n' "$ASC_KEY_P8_BASE64" > "$KEY"
          else
            printf '%s' "$ASC_KEY_P8_BASE64" | tr -d '[:space:]' | base64 --decode > "$KEY" 2>/dev/null || true
          fi
          if ! grep -q 'BEGIN PRIVATE KEY' "$KEY"; then
            echo "::error::ASC_KEY_P8_BASE64 did not yield a valid .p8 key."
            exit 1
          fi
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$KEY" "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "API key written OK"

      - name: Verify API key authenticates against App Store Connect
        run: |
          # Sign a JWT with the runner's key and call the REST API. If not 200, the
          # ASC_KEY_P8_BASE64 secret is wrong; fail here with a clear message rather
          # than a confusing "Unauthenticated" error during upload.
          node -e '
            const { createSign } = require("crypto");
            const { readFileSync } = require("fs");
            const kid = process.env.ASC_KEY_ID, iss = process.env.ASC_ISSUER_ID;
            const key = readFileSync(process.env.RUNNER_TEMP + "/keys/AuthKey.p8", "utf8");
            const b = (x) => Buffer.from(x).toString("base64").replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
            const now = Math.floor(Date.now()/1000);
            const si = b(JSON.stringify({alg:"ES256",kid,typ:"JWT"})) + "." + b(JSON.stringify({iss,iat:now,exp:now+180,aud:"appstoreconnect-v1"}));
            const s = createSign("SHA256"); s.update(si);
            const jwt = si + "." + b(s.sign({ key, dsaEncoding:"ieee-p1363" }));
            fetch("https://api.appstoreconnect.apple.com/v1/apps?limit=1", { headers: { Authorization: "Bearer " + jwt } })
              .then(async r => {
                console.log("App Store Connect REST auth status:", r.status);
                if (r.status !== 200) { console.log(await r.text()); console.error("::error::API key did not authenticate. Re-paste ASC_KEY_P8_BASE64 exactly."); process.exit(1); }
                console.log("API key authenticates correctly.");
              })
              .catch(e => { console.error(e); process.exit(1); });
          '

      - name: Import signing certificate and profile
        env:
          ASC_DIST_P12_BASE64: ${{ secrets.ASC_DIST_P12_BASE64 }}
        run: |
          KCH="$RUNNER_TEMP/build.keychain-db"
          KCH_PASS="ci-$GITHUB_RUN_ID"
          security create-keychain -p "$KCH_PASS" "$KCH"
          security set-keychain-settings -lut 21600 "$KCH"
          security unlock-keychain -p "$KCH_PASS" "$KCH"
          security list-keychains -d user -s "$KCH" $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KCH"

          printf '%s' "$ASC_DIST_P12_BASE64" | tr -d '[:space:]' | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KCH" -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCH_PASS" "$KCH" >/dev/null
          echo "Signing identities:"
          security find-identity -v -p codesigning "$KCH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          for PROFILE in ci/*.mobileprovision; do
            security cms -D -i "$PROFILE" > "$RUNNER_TEMP/pp.plist"
            UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$RUNNER_TEMP/pp.plist")
            NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$RUNNER_TEMP/pp.plist")
            cp "$PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
            echo "Installed profile '$NAME' ($UUID)"
          done
          rm -f "$RUNNER_TEMP/dist.p12"

      - name: Resolve build number
        id: bn
        run: |
          BN="${{ github.event.inputs.build_number }}"
          [ -n "$BN" ] || BN="${{ github.run_number }}"
          echo "value=$BN" >> "$GITHUB_OUTPUT"
          echo "Using build number $BN"

      - name: Archive
        run: |
          # Signing is configured per-target in project-testflight.yml (manual,
          # profile scoped to the app target only). Do NOT pass signing settings
          # here — command-line build settings apply to ALL targets, including
          # SPM resource bundles that reject a provisioning profile.
          xcodebuild archive \
            -project ReFxApp.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/ReFxApp.xcarchive" \
            CURRENT_PROJECT_VERSION="${{ steps.bn.outputs.value }}"

      - name: Export & upload to TestFlight
        run: |
          # destination=upload makes exportArchive sign-export AND upload in one
          # step, authenticating the delivery with the API key by explicit path.
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>destination</key><string>upload</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key><string>${PROFILE_NAME}</string>
              <key>com.refx.app.widget</key><string>ReFx Widget App Store</string>
            </dict>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ReFxApp.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyPath "$RUNNER_TEMP/keys/AuthKey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Clean up secrets
        if: always()
        run: |
          rm -f "$HOME/.appstoreconnect/private_keys/AuthKey_"*.p8 "$RUNNER_TEMP/keys/AuthKey.p8" "$RUNNER_TEMP/dist.p12"
          security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true

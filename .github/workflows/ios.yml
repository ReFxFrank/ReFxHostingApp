name: iOS Build & Test

# Free macOS CI for the iOS app (public repo). Proves the project compiles and
# the unit tests pass without needing a local Mac. Runs on every push/PR to the
# feature branch and main.
on:
  push:
    branches: [main, "claude/**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_15.4.app

      - name: Show versions
        run: xcodebuild -version && swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Build for the Simulator (no code signing needed). Pins a simulator that
      # exists on the macos-14 image.
      - name: Build & test
        run: |
          xcodebuild \
            -project ReFxApp.xcodeproj \
            -scheme "ReFxApp (Debug)" \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -skipPackagePluginValidation \
            clean build test \
            CODE_SIGNING_ALLOWED=NO

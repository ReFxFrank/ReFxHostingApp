# Lean project spec used ONLY by the TestFlight workflow.
# It builds the core app with manual App Store signing and intentionally drops
# the widget extension + app-group / associated-domains entitlements so the
# first TestFlight build signs against a basic App Store profile. The full app
# (widget, passkeys) is built from project.yml; re-add those here in build 2.
name: ReFxApp
options:
  bundleIdPrefix: com.refx
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: 16.1.0

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
    # Team applies to every target (incl. SPM resource bundles) so they can be
    # signed, but the provisioning profile is scoped to the app target only —
    # SPM bundles don't support profiles.
    DEVELOPMENT_TEAM: FM8Z8BA64H

targets:
  ReFxApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ReFxApp
      - path: Shared
    dependencies:
      - package: SocketIO
        product: SocketIO
    settings:
      base:
        INFOPLIST_FILE: ReFxApp/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.refx.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        # Manual signing: avoids the Xcode 16 automatic-provisioning portal bug
        # (listTeams.action 401). Identity + profile are supplied at build time.
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: FM8Z8BA64H
        CODE_SIGN_IDENTITY: "iPhone Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "ReFx App Store"
      configs:
        Debug:
          xcconfig: Config/Debug.xcconfig
        Release:
          xcconfig: Config/Release.xcconfig

schemes:
  ReFxApp (Release):
    build:
      targets:
        ReFxApp: all
    run:
      config: Release

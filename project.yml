name: ReFxApp
options:
  bundleIdPrefix: com.refx
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: 16.1.0

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad

targets:
  ReFxApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ReFxApp
    dependencies:
      - package: SocketIO
        product: SocketIO
    settings:
      base:
        INFOPLIST_FILE: ReFxApp/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.refx.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          xcconfig: Config/Debug.xcconfig
        Release:
          xcconfig: Config/Release.xcconfig

  ReFxAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Tests/ReFxAppTests
    dependencies:
      - target: ReFxApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.refx.app.tests

schemes:
  ReFxApp (Debug):
    build:
      targets:
        ReFxApp: all
        ReFxAppTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ReFxAppTests
  ReFxApp (Release):
    build:
      targets:
        ReFxApp: all
    run:
      config: Release
